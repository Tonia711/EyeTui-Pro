services:
  - type: web
    name: eyetui-backend
    runtime: docker
    plan: starter
    rootDir: backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eyetui-postgres
          property: connectionString

databases:
  - name: eyetui-postgres
    databaseName: hospital_lens
    user: eyetui
    plan: starter
